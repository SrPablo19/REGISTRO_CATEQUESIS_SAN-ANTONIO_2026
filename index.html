<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción Catequesis 2026 - Capilla San Antonio de Padua</title>
    <!-- Librerías para generación de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center; margin-bottom: 30px; background: white;
            padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .logo {
            width: 150px; height: 150px;
            background: url('https://lh6.googleusercontent.com/proxy/yD6Xv_eljAu4Q1UV4UDjnD8pgfqRf9hvXq-8HnBAE8YJCkEZAtp_UmnpRRM4h61JLj1ra0QLCM3SyPlCeVavbxZogSrF7iN1Gy7QfMA4b2wCs04-fTipNm76dRLYhmFdMeAvNf_s') center/cover;
            border-radius: 50%; margin: 0 auto 20px;
            border: 5px solid #d4a574;
        }
        h1 { color: #8B4513; font-size: 2.2em; margin-bottom: 5px; }
        .subtitle { color: #654321; font-size: 1.2em; font-weight: 300; }
        
        .tabs { display: flex; background: white; border-radius: 15px 15px 0 0; }
        .tab-btn {
            flex: 1; padding: 20px; background: none; border: none; font-size: 1.1em;
            font-weight: 600; color: #666; cursor: pointer; border-radius: 15px 15px 0 0;
            transition: 0.3s;
        }
        .tab-btn.active { background: #d4a574; color: white; }
        
        .tab-content {
            display: none; background: white; padding: 40px;
            border-radius: 0 0 20px 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .tab-content.active { display: block; }
        
        .form-section { margin-bottom: 30px; padding: 25px; background: #f8f9fa; border-radius: 12px; border-left: 5px solid #d4a574; }
        .form-section h3 { color: #8B4513; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        label.optional::after { content: ' (Opcional)'; color: #999; font-weight: 400; font-size: 0.9em; }
        input[type="text"], input[type="date"], input[type="tel"], select, input[type="number"] {
            width: 100%; padding: 10px 15px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 16px;
        }
        input:focus, select:focus { border-color: #d4a574; outline: none; }
        
        input[type="number"]:disabled {
            background-color: #f0f0f0;
            color: #666;
            cursor: not-allowed;
        }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .radio-group { display: flex; gap: 20px; margin: 10px 0; }
        .dual-input { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .triple-input { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        
        .recommendation {
            background: linear-gradient(45deg, #d4a574, #f4e4bc); 
            padding: 20px; border-radius: 12px;
            text-align: center; margin: 20px 0; border: 3px solid #b8860b; 
            font-weight: bold; color: #8B4513; font-size: 1.1em;
        }

        .selector-etapa {
            background: #fff8e7;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #ffc107;
            margin: 0 0 30px 0;
        }

        .selector-etapa label {
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 12px;
        }

        .selector-etapa select {
            border: 2px solid #ffc107;
            background-color: white;
            cursor: pointer;
        }

        .selector-etapa select:focus {
            border-color: #d4a574;
            box-shadow: 0 0 8px rgba(212, 165, 116, 0.3);
        }
        
        .btn {
            background: linear-gradient(45deg, #d4a574, #b8860b); 
            color: white; padding: 12px 30px;
            border: none; border-radius: 25px; font-size: 1.1em; font-weight: 600; cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-full { width: 100%; margin: 10px 0; }
        
        .report-controls { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        .etapa-section { margin-bottom: 40px; }
        .etapa-section h3 { background: #d4a574; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .report-table { width: 100%; border-collapse: collapse; background: white; }
        .report-table th, .report-table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        .report-table th { background: #f4e4bc; color: #8B4513; }
        .btn-action { padding: 6px 12px; border: none; border-radius: 4px; color: white; cursor: pointer; margin-right: 5px; font-size: 12px; }
        .btn-edit { background: #4CAF50; }
        .btn-delete { background: #f44336; }

        .loading { display: none; text-align: center; margin: 20px 0; z-index: 9999; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #d4a574; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"></div>
            <h1>Capilla San Antonio de Padua</h1>
            <p class="subtitle">Parroquia María Auxiliadora - Loma Grande</p>
            <h2>Inscripción y Gestión Catequesis 2026</h2>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('inscripcion')">📝 Inscripciones</button>
            <button class="tab-btn" onclick="switchTab('reportes')">📊 Reportes por Etapa</button>
        </div>

        <!-- Formulario de Inscripción -->
        <div id="inscripcion" class="tab-content active">
            <form id="inscripcionForm">
                <div class="form-section">
                    <h3>📚 Datos del Niño/a</h3>
                    <div class="form-group">
                        <label>Nombres y Apellidos Completo(s) *</label>
                        <input type="text" id="nombres" required>
                    </div>
                    <div class="dual-input">
                        <div class="form-group">
                            <label>Cédula de Identidad *</label>
                            <input type="text" id="cedula" required>
                        </div>
                        <div class="checkbox-group" style="margin-top: 30px;">
                            <input type="checkbox" id="cedulaEntregada">
                            <label>Ya entregué copia de la Cédula</label>
                        </div>
                    </div>
                    
                    <div class="triple-input">
                        <div class="form-group">
                            <label>Fecha de Nacimiento *</label>
                            <input type="date" id="fechaNacimiento" required>
                        </div>
                        <div class="form-group">
                            <label>Edad (años) *</label>
                            <input type="number" id="edad" readonly disabled>
                        </div>
                        <div class="checkbox-group" style="margin-top: 30px;">
                            <input type="checkbox" id="bautismoEntregado">
                            <label>Ya entregué Certificado de Bautismo</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Condición:</label>
                        <div class="radio-group">
                            <label><input type="radio" name="condicion" value="legitimo" required> Legítimo</label>
                            <label><input type="radio" name="condicion" value="natural" required> Natural</label>
                        </div>
                    </div>
                    
                    <!-- CASILLA DE PRIMERA COMUNIÓN - SOLO SI EDAD >= 10 -->
                    <div id="primeraComunionContainer" style="display: none;">
                        <div class="checkbox-group" style="background:#fff3cd; padding:15px; border-radius:8px; border-left: 5px solid #ffc107;">
                            <input type="checkbox" id="primeraComunion">
                            <label style="margin:0; font-weight:bold;">El niño/a YA hizo su Primera Comunión</label>
                        </div>
                    </div>
                </div>

                <!-- RECOMENDACIÓN + SELECTOR MANUAL -->
                <div id="recomendacion" class="recommendation" style="display: none;">
                    🎯 <strong>ETAPA RECOMENDADA:</strong> <span id="etapaRecomendada"></span>
                </div>

                <div id="selectorEtapa" class="selector-etapa" style="display: none;">
                    <label for="etapaManual">📋 O selecciona manualmente la etapa:</label>
                    <select id="etapaManual">
                        <option value="">-- Selecciona una Etapa --</option>
                        <option value="Participante Oyente">Participante Oyente</option>
                        <option value="Pequeños Seguidores de Jesús">Pequeños Seguidores de Jesús</option>
                        <option value="Pequeños Misioneros de Jesús">Pequeños Misioneros de Jesús</option>
                        <option value="Primera Confesión">Primera Confesión</option>
                        <option value="Primera Comunión">Primera Comunión</option>
                        <option value="CAVEVI 1">CAVEVI 1</option>
                        <option value="CAVEVI 2">CAVEVI 2</option>
                        <option value="CAVEVI 3">CAVEVI 3</option>
                        <option value="1° Año de Confirmación">1° Año de Confirmación</option>
                    </select>
                </div>

                <div class="form-section">
                    <h3>👨‍👩‍👧 Datos de Padres/Tutores</h3>
                    <div class="form-group dual-input">
                        <div>
                            <label for="madre" class="optional">Nombre Madre</label>
                            <input type="text" id="madre">
                        </div>
                        <div>
                            <label for="padre" class="optional">Nombre Padre</label>
                            <input type="text" id="padre">
                        </div>
                    </div>
                    <div class="form-group dual-input">
                        <div>
                            <label>Barrio/Compañía *</label>
                            <input type="text" id="barrio" required>
                        </div>
                        <div>
                            <label>Teléfono de Contacto *</label>
                            <input type="tel" id="telefono" required>
                        </div>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-full">📋 Guardar Inscripción</button>
            </form>
        </div>

        <!-- Sección de Reportes -->
        <div id="reportes" class="tab-content">
            <div class="report-controls">
                <button class="btn" onclick="generarPDFPorEtapa()">📊 Descargar PDF por Etapas</button>
            </div>
            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <p style="margin-top: 15px; font-weight: bold;">Generando PDF...</p>
            </div>
            <!-- Contenedor dinámico de las tablas agrupadas -->
            <div id="reportesList"></div>
        </div>
    </div>

    <script>
        // =================================================================
        // CONFIGURACIÓN DE BASE DE DATOS ONLINE (NPOINT.IO)
        const API_URL = "https://api.npoint.io/cf71e351c3a87b360826";
        // =================================================================

        let registros = [];
        let editIndex = -1;

        const etapasList = [
            "Participante Oyente", "Pequeños Seguidores de Jesús", "Pequeños Misioneros de Jesús", 
            "Primera Confesión", "Primera Comunión", "CAVEVI 1", "CAVEVI 2", "CAVEVI 3", "1° Año de Confirmación"
        ];

        // Fecha de referencia: 31 de octubre de 2026
        const fechaCorte = new Date(2026, 9, 31);

        // Cargar registros desde Npoint
        async function cargarRegistros() {
            const loader = document.getElementById('loadingIndicator');
            if(loader) {
                loader.querySelector('p').textContent = 'Sincronizando datos...';
                loader.style.display = 'block';
            }

            try {
                // ?nocache= evita que el navegador cargue una versión vieja
                const urlGet = API_URL.split('?')[0];
                const response = await fetch(urlGet + '?nocache=' + new Date().getTime(), {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' },
                    cache: 'no-store'
                });

                if (response.ok) {
                    const data = await response.json();
                    registros = Array.isArray(data) ? data : [];
                    console.log("✅ Datos descargados:", registros.length);
                }
            } catch (error) {
                console.error("Error al cargar datos:", error);
            }
            if(loader) loader.style.display = 'none';
        }

        // Guardar la lista completa en Npoint
        async function guardarEnNube() {
            const loader = document.getElementById('loadingIndicator');
            if(loader) {
                loader.querySelector('p').textContent = 'Guardando online...';
                loader.style.display = 'block';
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(registros)
                });

                if(loader) loader.style.display = 'none';

                if (response.ok) {
                    console.log("✅ Guardado en la nube exitoso");
                    return true;
                } else {
                    return false;
                }
            } catch (error) {
                if(loader) loader.style.display = 'none';
                console.error("Error guardando:", error);
                return false;
            }
        }

        // Calcular edad considerando marzo 2026
        function calcularEdad(fechaNacimiento) {
            const fecha = new Date(fechaNacimiento);
            const hoy = new Date(2026, 2, 17); // 17 de marzo de 2026

            let edad = hoy.getFullYear() - fecha.getFullYear();
            const mes = hoy.getMonth() - fecha.getMonth();

            if (mes < 0 || (mes === 0 && hoy.getDate() < fecha.getDate())) {
                edad--;
            }

            return edad;
        }

        // Cambiar pestañas
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            if(tabName === 'inscripcion') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('inscripcion').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('reportes').classList.add('active');
                cargarRegistros().then(() => actualizarReportes());
            }
        }

        // Lógica de validación estricta de fechas y etapas
        function calcularEtapaRecomendada() {
            const fechaInput = document.getElementById('fechaNacimiento').value;
            const edadInput = document.getElementById('edad');
            const recomendacionDiv = document.getElementById('recomendacion');
            const selectorDiv = document.getElementById('selectorEtapa');
            const etapaSpan = document.getElementById('etapaRecomendada');
            const primeraComunionContainer = document.getElementById('primeraComunionContainer');
            const primeraComunionCheckbox = document.getElementById('primeraComunion');

            if (!fechaInput) {
                edadInput.value = '';
                recomendacionDiv.style.display = 'none';
                selectorDiv.style.display = 'none';
                primeraComunionContainer.style.display = 'none';
                return;
            }

            // Calcular edad actual (marzo 2026)
            const edadActual = calcularEdad(fechaInput);
            edadInput.value = edadActual;

            // Calcular edad al 31 de octubre de 2026
            const fecha = new Date(fechaInput);
            let edadAlCorte = fechaCorte.getFullYear() - fecha.getFullYear();
            const mesNac = fecha.getMonth();
            const diaNac = fecha.getDate();

            if (mesNac > 9 || (mesNac === 9 && diaNac > 31)) {
                edadAlCorte--;
            }

            const hizoPrimeraComunion = primeraComunionCheckbox.checked;

            // MOSTRAR/OCULTAR casilla de Primera Comunión solo si edad >= 10
            if (edadAlCorte >= 10) {
                primeraComunionContainer.style.display = 'block';
            } else {
                primeraComunionContainer.style.display = 'none';
                primeraComunionCheckbox.checked = false;
            }

            let etapa = "";
            if (edadAlCorte < 7) {
                etapa = "Participante Oyente";
            } else if (edadAlCorte === 7) {
                etapa = "Pequeños Seguidores de Jesús";
            } else if (edadAlCorte === 8) {
                etapa = "Pequeños Misioneros de Jesús";
            } else if (edadAlCorte === 9) {
                etapa = "Primera Confesión";
            } else if (edadAlCorte === 10) {
                etapa = "Primera Comunión";
            } else if (edadAlCorte === 11) {
                etapa = hizoPrimeraComunion ? "CAVEVI 1" : "Primera Comunión";
            } else if (edadAlCorte === 12) {
                etapa = hizoPrimeraComunion ? "CAVEVI 2" : "Primera Comunión";
            } else if (edadAlCorte === 13) {
                etapa = hizoPrimeraComunion ? "CAVEVI 3" : "Primera Comunión";
            } else if (edadAlCorte >= 14) {
                etapa = hizoPrimeraComunion ? "1° Año de Confirmación" : "Primera Comunión";
            }

            etapaSpan.textContent = etapa;
            recomendacionDiv.style.display = 'block';
            selectorDiv.style.display = 'block';

            document.getElementById('etapaManual').value = etapa;
        }

        document.getElementById('fechaNacimiento').addEventListener('input', calcularEtapaRecomendada);
        document.getElementById('primeraComunion').addEventListener('change', calcularEtapaRecomendada);

        // Guardar o Actualizar formulario
        document.getElementById('inscripcionForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const condicionNode = document.querySelector('input[name="condicion"]:checked');
            const etapaFinal = document.getElementById('etapaManual').value || document.getElementById('etapaRecomendada').textContent;

            const datos = {
                // Generar un ID único basado en la fecha exacta
                id_unico: Date.now().toString(),
                nombres: document.getElementById('nombres').value,
                cedula: document.getElementById('cedula').value,
                cedulaEntregada: document.getElementById('cedulaEntregada').checked,
                fechaNacimiento: document.getElementById('fechaNacimiento').value,
                edad: parseInt(document.getElementById('edad').value),
                bautismoEntregado: document.getElementById('bautismoEntregado').checked,
                condicion: condicionNode ? condicionNode.value : '',
                primeraComunion: document.getElementById('primeraComunion').checked,
                madre: document.getElementById('madre').value,
                padre: document.getElementById('padre').value,
                barrio: document.getElementById('barrio').value,
                telefono: document.getElementById('telefono').value,
                etapa: etapaFinal
            };

            // 1. Descargamos la última versión de la nube
            await cargarRegistros();

            // 2. Procesamos si es edición o nuevo
            if (editIndex === -1) {
                registros.push(datos);
            } else {
                // Buscar por ID único o Cédula original
                const idOriginal = document.getElementById('nombres').dataset.idUnico;
                const cedulaOriginal = document.getElementById('cedula').dataset.original;

                const indexReal = registros.findIndex(r => r.id_unico === idOriginal || r.cedula === cedulaOriginal);

                if(indexReal !== -1) {
                    datos.id_unico = registros[indexReal].id_unico || datos.id_unico; // mantener ID viejo
                    registros[indexReal] = datos;
                } else {
                    registros.push(datos); // Si no se encuentra, agregar como nuevo
                }

                editIndex = -1;
                document.getElementById('btnSubmit').textContent = '📋 Guardar Inscripción';
                delete document.getElementById('nombres').dataset.idUnico;
                delete document.getElementById('cedula').dataset.original;
            }

            // 3. Subimos la versión actualizada a la nube
            const exito = await guardarEnNube();

            if (exito) {
                alert('✅ Inscripción guardada exitosamente en la nube!');
                this.reset();
                document.getElementById('recomendacion').style.display = 'none';
                document.getElementById('selectorEtapa').style.display = 'none';
                document.getElementById('primeraComunionContainer').style.display = 'none';
            } else {
                alert('❌ Error al guardar. Verifica tu conexión.');
            }
        });

        // Generar vistas HTML por Etapas en el menú Reportes
        function actualizarReportes() {
            const contenedor = document.getElementById('reportesList');
            contenedor.innerHTML = ''; 

            if (!registros || registros.length === 0) {
                contenedor.innerHTML = '<p style="text-align:center; padding:20px; font-size:16px; color: #999;">Aún no hay registros cargados.</p>';
                return;
            }

            etapasList.forEach(etapaNombre => {
                const registrosEtapa = registros.filter(r => r.etapa === etapaNombre);

                if (registrosEtapa.length > 0) {
                    const section = document.createElement('div');
                    section.className = 'etapa-section';

                    let tablaHTML = `
                        <h3>${etapaNombre} (${registrosEtapa.length} Inscriptos)</h3>
                        <div style="overflow-x:auto;">
                            <table class="report-table">
                                <thead>
                                    <tr>
                                        <th>N°</th>
                                        <th>C.I.C N°</th>
                                        <th>Nombres y Apellidos</th>
                                        <th>Fecha Nac.</th>
                                        <th>Edad</th>
                                        <th>Cert. Bautismo</th>
                                        <th>Hijo</th>
                                        <th>Madre</th>
                                        <th>Padre</th>
                                        <th>Barrio</th>
                                        <th>Teléfono</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    registrosEtapa.forEach((r, i) => {
                        // Pasamos el ID único en lugar de índice global si existe
                        const identificador = r.id_unico ? `'${r.id_unico}'` : registros.indexOf(r);

                        tablaHTML += `
                            <tr>
                                <td>${i + 1}</td>
                                <td>${r.cedula}</td>
                                <td>${r.nombres}</td>
                                <td>${r.fechaNacimiento ? r.fechaNacimiento.split('-').reverse().join('/') : ''}</td>
                                <td>${r.edad !== undefined ? r.edad : ''}</td>
                                <td>${r.bautismoEntregado ? '✓ Entregado' : 'Pendiente'}</td>
                                <td>${r.condicion === 'legitimo' ? 'Legítimo' : 'Natural'}</td>
                                <td>${r.madre || '-'}</td>
                                <td>${r.padre || '-'}</td>
                                <td>${r.barrio}</td>
                                <td>${r.telefono}</td>
                                <td>
                                    <button class="btn-action btn-edit" onclick="editarRegistro(${identificador})">Editar</button>
                                    <button class="btn-action btn-delete" onclick="eliminarRegistro(${identificador})">Borrar</button>
                                </td>
                            </tr>
                        `;
                    });

                    tablaHTML += `</tbody></table></div>`;
                    section.innerHTML = tablaHTML;
                    contenedor.appendChild(section);
                }
            });
        }

        // Cargar datos al formulario para edición
        function editarRegistro(identificador) {
            // Buscar por ID único o por índice si es viejo
            let r;
            if (typeof identificador === 'string') {
                r = registros.find(reg => reg.id_unico === identificador);
            } else {
                r = registros[identificador];
            }

            if (!r) return;

            document.getElementById('nombres').value = r.nombres;
            document.getElementById('cedula').value = r.cedula;
            document.getElementById('cedulaEntregada').checked = r.cedulaEntregada;
            document.getElementById('fechaNacimiento').value = r.fechaNacimiento;
            document.getElementById('bautismoEntregado').checked = r.bautismoEntregado;

            if(r.condicion) {
                const cond = document.querySelector(`input[name="condicion"][value="${r.condicion}"]`);
                if(cond) cond.checked = true;
            }

            document.getElementById('primeraComunion').checked = r.primeraComunion;
            document.getElementById('madre').value = r.madre;
            document.getElementById('padre').value = r.padre;
            document.getElementById('barrio').value = r.barrio;
            document.getElementById('telefono').value = r.telefono;

            calcularEtapaRecomendada();
            document.getElementById('etapaManual').value = r.etapa;

            // Guardar identificadores para no pisar otro registro
            document.getElementById('nombres').dataset.idUnico = r.id_unico;
            document.getElementById('cedula').dataset.original = r.cedula;

            editIndex = 1; // Indicador de que estamos editando
            document.getElementById('btnSubmit').textContent = '📝 Guardar Cambios';
            switchTab('inscripcion');
            window.scrollTo(0,0);
        }

        async function eliminarRegistro(identificador) {
            if (confirm('¿Eliminar definitivamente este registro?')) {
                // Bajar última versión
                await cargarRegistros();

                let indexReal = -1;
                if (typeof identificador === 'string') {
                    indexReal = registros.findIndex(r => r.id_unico === identificador);
                } else {
                    indexReal = identificador;
                }

                if (indexReal !== -1) {
                    registros.splice(indexReal, 1);
                    const exito = await guardarEnNube();
                    if(exito) {
                        actualizarReportes();
                        alert('✅ Registro eliminado correctamente.');
                    }
                } else {
                    alert('⚠️ El registro ya no existía en la nube.');
                    actualizarReportes();
                }
            }
        }

        // FUNCIÓN DE GENERACIÓN DE PDF CON DISEÑO EXACTO DE LA IMAGEN
        async function generarPDFPorEtapa() {
            await cargarRegistros(); // Asegurarnos de tener todo lo último

            if(!registros || registros.length === 0) {
                alert("❌ No hay registros disponibles para generar el PDF.");
                return;
            }

            document.getElementById('loadingIndicator').style.display = 'block';

            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF({
                        orientation: 'portrait',
                        unit: 'mm',
                        format: 'a4'
                    });

                    let primeraVez = true;
                    const pageHeight = doc.internal.pageSize.getHeight();
                    const pageWidth = doc.internal.pageSize.getWidth();

                    etapasList.forEach((etapaNombre) => {
                        const registrosEtapa = registros.filter(r => r.etapa === etapaNombre);
                        if (registrosEtapa.length === 0) return;

                        if (!primeraVez) {
                            doc.addPage();
                        }
                        primeraVez = false;

                        let yPos = 10;

                        // ===== ENCABEZADO =====
                        doc.setFontSize(9);
                        doc.setFont("helvetica", "bold");
                        doc.text("DIÓCESIS DE CAACUPÉ", pageWidth / 2, yPos, { align: "center" });
                        yPos += 4;

                        doc.setFontSize(8);
                        doc.text("PARROQUIA MARIA AUXILIADORA - LOMA GRANDE", pageWidth / 2, yPos, { align: "center" });
                        yPos += 3;

                        doc.text("CAPILLA SAN ANTONIO", pageWidth / 2, yPos, { align: "center" });
                        yPos += 3;

                        doc.text("AÑO 2025", pageWidth / 2, yPos, { align: "center" });
                        yPos += 6;

                        // Línea divisoria
                        doc.setDrawColor(0, 0, 0);
                        doc.line(10, yPos, pageWidth - 10, yPos);
                        yPos += 4;

                        // ===== LÍNEAS DE CATEQUISTA Y TELÉFONO =====
                        doc.setFontSize(7);
                        doc.setFont("helvetica", "normal");

                        const labelWidth = 25;
                        const lineStartX = labelWidth + 2;
                        const lineLength = 40;

                        doc.text("Catequista:", 10, yPos);
                        doc.line(lineStartX, yPos + 1, lineStartX + lineLength, yPos + 1);

                        doc.text("Teléfono:", pageWidth / 2 + 10, yPos);
                        doc.line(pageWidth / 2 + 10 + labelWidth + 2, yPos + 1, pageWidth / 2 + 10 + labelWidth + 2 + lineLength, yPos + 1);

                        yPos += 6;

                        // ===== TÍTULO DE ETAPA =====
                        doc.setFontSize(8);
                        doc.setFont("helvetica", "bold");
                        doc.text(`ETAPA: ${etapaNombre.toUpperCase()}`, pageWidth / 2, yPos, { align: "center" });
                        yPos += 8;

                        // ===== TABLA CON AUTOTABLE =====
                        const tableBody = registrosEtapa.map((r, i) => {
                            const fechaFormato = r.fechaNacimiento ? r.fechaNacimiento.split('-').reverse().join('/') : '';
                            return [
                                i + 1,
                                r.nombres,
                                r.cedula,
                                fechaFormato,
                                (r.edad !== undefined && r.edad !== null && !isNaN(r.edad)) ? r.edad + " años" : '',
                                r.cedulaEntregada ? 'Sí' : '',
                                r.bautismoEntregado ? 'Sí' : '',
                                r.condicion === 'legitimo' ? 'Legítimo' : 'Natural',
                                r.padre || '',
                                r.madre || '',
                                r.barrio,
                                r.telefono
                            ];
                        });

                        doc.autoTable({
                            startY: yPos,
                            head: [[
                                'N°',
                                'CATEQUIZANDO\nNombres y Apellidos',
                                'C.I.C N°',
                                'Fecha de\nNacimiento',
                                'Edad',
                                'Copia de\nCédula',
                                'Certificado de\nBautismo',
                                'Hijo',
                                'Nombre del Padre\n(TUTOR 2)',
                                'Nombre de la Madre\n(TUTOR 1)',
                                'Barrio/Cñia',
                                'N° Telef.'
                            ]],
                            body: tableBody,
                            theme: 'grid',
                            headStyles: {
                                fillColor: [212, 165, 116],
                                textColor: [0, 0, 0],
                                lineColor: [0, 0, 0],
                                lineWidth: 0.5,
                                halign: 'center',
                                valign: 'middle',
                                fontSize: 6,
                                fontStyle: 'bold'
                            },
                            bodyStyles: {
                                lineColor: [0, 0, 0],
                                lineWidth: 0.3,
                                fontSize: 6,
                                halign: 'center',
                                valign: 'middle'
                            },
                            columnStyles: {
                                0: { halign: 'center', cellWidth: 8 },
                                1: { halign: 'left', cellWidth: 35 },
                                2: { halign: 'center', cellWidth: 16 },
                                3: { halign: 'center', cellWidth: 14 },
                                4: { halign: 'center', cellWidth: 10 },
                                5: { halign: 'center', cellWidth: 10 },
                                6: { halign: 'center', cellWidth: 10 },
                                7: { halign: 'center', cellWidth: 12 },
                                8: { halign: 'left', cellWidth: 22 },
                                9: { halign: 'left', cellWidth: 22 },
                                10: { halign: 'left', cellWidth: 16 },
                                11: { halign: 'center', cellWidth: 14 }
                            },
                            margin: { top: yPos, right: 8, bottom: 10, left: 8 }
                        });
                    });

                    document.getElementById('loadingIndicator').style.display = 'none';
                    doc.save('Planilla_Inscripciones_Catequesis_2026.pdf');
                    alert('✅ PDF generado y descargado correctamente.');

                } catch (error) {
                    console.error("Error al generar PDF:", error);
                    document.getElementById('loadingIndicator').style.display = 'none';
                    alert('❌ Error al generar el PDF. Revisa la consola.');
                }
            }, 100);
        }

        // Cargar registros al iniciar la página
        window.addEventListener('load', async function() {
            await cargarRegistros();
        });
</script>
